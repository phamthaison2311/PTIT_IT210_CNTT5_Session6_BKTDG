<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:c="">
<head>
    <meta charset="UTF-8">
    <title>Trang danh sách</title>
</head>
<body>
<div th:replace="~{layout/fragments :: header(${pageTitle})}"></div>

<table>
    <thead>
    <tr>
        <th>Mã</th>
        <th>Tên sách</th>
        <th>Tác giả</th>
        <th>Giá</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="b : ${books}" th:classappend="${b.price >= 300000} ? 'highlight' : ''">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
        <td><a th:href="@{/books/{id}(id=${b.id})}">Xem</a></td>
    </tr>
    </tbody>
</table>

<div th:replace="~{layout/fragments :: footer}"></div>
</body>
</html>
